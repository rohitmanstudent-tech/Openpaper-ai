name: nim
version: 1.0.0
description: "NVIDIA NIM provider — local-first, GPU-accelerated with RTX optimization and cloud fallback"
author: "OpenPaper AI"
plugin_type: provider
entrypoint: plugin.py
dependencies:
  - httpx>=0.27.0
permissions:
  - network
hooks:
  - on_load
  - on_unload
config_schema:
  type: object
  properties:
    api_key:
      type: string
      description: "NVIDIA cloud API key (optional — local NIM needs no key)"
    base_url:
      type: string
      description: "NIM base URL"
      default: "http://localhost:8000"
    default_model:
      type: string
      description: "Default model"
      default: "meta/llama-3.1-8b-instruct"
