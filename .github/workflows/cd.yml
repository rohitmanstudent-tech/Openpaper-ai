name: CD

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api_tag: ${{ steps.meta-api.outputs.tags }}
      web_tag: ${{ steps.meta-web.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Extract metadata for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'staging' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: staging
      url: https://staging.openpaper.ai
    steps:
      - name: Check secrets
        id: check-secrets
        run: |
          if [ -n "$SSH_HOST" ] && [ -n "$SSH_KEY" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
      - uses: actions/checkout@v4
      - name: Deploy to staging
        if: steps.check-secrets.outputs.has_secrets == 'true'
        env:
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          ssh-agent sh -c "
            echo \"$SSH_KEY\" | ssh-add - > /dev/null 2>&1 &&
            mkdir -p ~/.ssh &&
            ssh-keyscan -H \"$SSH_HOST\" >> ~/.ssh/known_hosts 2>/dev/null &&
            ssh \"$SSH_HOST\" '
              cd /opt/openpaper &&
              docker compose pull &&
              docker compose up -d --force-recreate
            '
          "
      - name: Skip notice
        if: steps.check-secrets.outputs.has_secrets != 'true'
        run: echo "::notice::STAGING_SSH_HOST or STAGING_SSH_KEY not set — skipping deploy to staging"

  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://app.openpaper.ai
    steps:
      - uses: actions/checkout@v4
      - name: Check secrets
        id: check-prod-secrets
        run: |
          if [ -n "$SSH_HOST" ] && [ -n "$SSH_KEY" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
      - name: Deploy to production
        if: steps.check-prod-secrets.outputs.has_secrets == 'true'
        env:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          ssh-agent sh -c "
            echo \"$SSH_KEY\" | ssh-add - > /dev/null 2>&1 &&
            mkdir -p ~/.ssh &&
            ssh-keyscan -H \"$SSH_HOST\" >> ~/.ssh/known_hosts 2>/dev/null &&
            ssh \"$SSH_HOST\" '
              cd /opt/openpaper &&
              docker compose pull &&
              docker compose up -d --force-recreate
            '
          "
      - name: Skip notice
        if: steps.check-prod-secrets.outputs.has_secrets != 'true'
        run: echo "::notice::PROD_SSH_HOST or PROD_SSH_KEY not set — skipping deploy to production"
