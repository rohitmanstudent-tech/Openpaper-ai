name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-python:
    name: Python lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: [lint-python]
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: openpaper
          POSTGRES_USER: openpaper
          POSTGRES_PASSWORD: openpaper_secret
        options: >-
          --health-cmd "pg_isready -U openpaper"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml
      - run: pip install -e ".[dev]"
        env:
          DATABASE_URL: postgresql+asyncpg://openpaper:openpaper_secret@localhost:5432/openpaper
          REDIS_URL: redis://localhost:6379/0
      - run: alembic upgrade head
        working-directory: apps/api
        env:
          DB_URL: postgresql+asyncpg://openpaper:openpaper_secret@localhost:5432/openpaper
      - run: python -m pytest tests/ -v --cov=app --cov-report=xml
        env:
          DATABASE_URL: postgresql+asyncpg://openpaper:openpaper_secret@localhost:5432/openpaper
          REDIS_URL: redis://localhost:6379/0
      - uses: codecov/codecov-action@v4
        with:
          file: apps/api/coverage.xml
          flags: backend

  lint-frontend:
    name: Frontend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint --workspace=apps/web -- --quiet

  build-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build --workspace=apps/web

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          tags: ${{ env.IMAGE_NAME }}-api:ci-${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          tags: ${{ env.IMAGE_NAME }}-web:ci-${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
