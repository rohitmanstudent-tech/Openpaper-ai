name: Docker Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SECRET_KEY: ci-test-secret-key-do-not-use-in-production
  POSTGRES_PASSWORD: openpaper_secret
  COMPOSE_FILE: docker-compose.yml

jobs:
  docker-integration:
    name: Docker Compose validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          tags: openpaper-api:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          tags: openpaper-web:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure docker-compose for CI
        run: |
          # Pin images to CI-built tags
          echo "version: \"3.9\"
          services:
            postgres:
              image: postgres:16-alpine
              environment:
                POSTGRES_DB: openpaper
                POSTGRES_USER: openpaper
                POSTGRES_PASSWORD: \${POSTGRES_PASSWORD:-openpaper_secret}
              ports:
                - \"127.0.0.1:5432:5432\"
              healthcheck:
                test: [\"CMD-SHELL\", \"pg_isready -U openpaper -d openpaper\"]
                interval: 10s
                timeout: 5s
                retries: 5
                start_period: 30s
            redis:
              image: redis:7-alpine
              command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
              ports:
                - \"127.0.0.1:6379:6379\"
              healthcheck:
                test: [\"CMD\", \"redis-cli\", \"ping\"]
                interval: 10s
                timeout: 3s
                retries: 5
                start_period: 10s
            api:
              image: openpaper-api:ci
              ports:
                - \"127.0.0.1:8000:8000\"
              environment:
                APP_NAME: OpenPaper AI
                VERSION: \"1.0.0\"
                DEBUG: \"false\"
                DATABASE_URL: postgresql+asyncpg://openpaper:\${POSTGRES_PASSWORD:-openpaper_secret}@postgres:5432/openpaper
                REDIS_URL: redis://redis:6379/0
                SECRET_KEY: \${SECRET_KEY}
                ALGORITHM: HS256
                ACCESS_TOKEN_EXPIRE_MINUTES: \"30\"
                LOG_LEVEL: info
                CORS_ORIGINS: http://localhost:3000
              depends_on:
                postgres:
                  condition: service_healthy
                redis:
                  condition: service_healthy
              healthcheck:
                test: [\"CMD\", \"python\", \"-c\", \"import httpx; httpx.get('http://localhost:8000/api/health', timeout=5).raise_for_status()\"]
                interval: 30s
                timeout: 10s
                retries: 10
                start_period: 60s
            web:
              image: openpaper-web:ci
              ports:
                - \"127.0.0.1:3000:3000\"
              environment:
                NODE_ENV: production
                NEXT_PUBLIC_API_URL: /api/v1
              depends_on:
                api:
                  condition: service_healthy
              healthcheck:
                test: [\"CMD\", \"wget\", \"--no-verbose\", \"--tries=1\", \"--spider\", \"http://localhost:3000/\"]
                interval: 30s
                timeout: 10s
                retries: 5
                start_period: 40s
          " > docker-compose.ci.yml

      - name: Start services
        run: |
          docker compose -f docker-compose.ci.yml up -d
          echo "Waiting for services to be healthy..."

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "API is healthy after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "API failed to become healthy within 30 attempts"
              docker compose -f docker-compose.ci.yml logs api
              exit 1
            fi
            sleep 5
          done

      - name: Verify API health endpoint
        run: |
          echo "=== API Health Check ==="
          curl -s http://localhost:8000/api/health | python -m json.tool
          echo ""
          echo "=== V1 Health Check ==="
          curl -s http://localhost:8000/api/v1/health/live | python -m json.tool

      - name: Verify API ready endpoint
        run: |
          echo "=== API Ready Check ==="
          curl -s http://localhost:8000/api/v1/health/ready | python -m json.tool

      - name: Verify API deep check
        run: |
          echo "=== API Deep Check ==="
          curl -s http://localhost:8000/api/v1/health/deep | python -m json.tool

      - name: Verify frontend serves content
        run: |
          echo "=== Frontend Check ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
          if [ "$STATUS" -eq 200 ]; then
            echo "Frontend responded with HTTP 200 OK"
          else
            echo "Frontend responded with HTTP $STATUS"
            docker compose -f docker-compose.ci.yml logs web
            exit 1
          fi

      - name: Verify API response headers (security)
        run: |
          echo "=== Security Headers Check ==="
          curl -sI http://localhost:8000/api/health | grep -i "x-frame-options\|x-content-type-options\|x-xss-protection\|strict-transport-security\|content-security-policy"
          echo ""
          echo "All security headers present."

      - name: Verify marketplace endpoint
        run: |
          echo "=== Marketplace Endpoint ==="
          curl -s http://localhost:8000/api/v1/marketplace | python -m json.tool | head -20

      - name: Service logs
        if: always()
        run: |
          echo "=== API Logs ==="
          docker compose -f docker-compose.ci.yml logs api --tail=50
          echo ""
          echo "=== Web Logs ==="
          docker compose -f docker-compose.ci.yml logs web --tail=20
          echo ""
          echo "=== PostgreSQL Logs ==="
          docker compose -f docker-compose.ci.yml logs postgres --tail=20
          echo ""
          echo "=== Redis Logs ==="
          docker compose -f docker-compose.ci.yml logs redis --tail=10

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.ci.yml down -v
          rm -f docker-compose.ci.yml
