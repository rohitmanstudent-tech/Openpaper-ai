name: Docker Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SECRET_KEY: ci-test-secret-key-do-not-use-in-production
  ENCRYPTION_KEY: 7ddxtizGdsHOWeI871nHOroUWANwVij5VN2NqkiaokM=
  POSTGRES_PASSWORD: openpaper_secret
  COMPOSE_FILE: docker-compose.yml

jobs:
  docker-integration:
    name: Docker Compose validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          tags: openpaper-api:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          tags: openpaper-web:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure docker-compose for CI
        run: docker compose -f docker-compose.ci.yml config > /dev/null

      - name: Start services
        shell: bash
        run: |
          set +e
          docker compose -f docker-compose.ci.yml up -d
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== docker compose up -d FAILED with exit code $EXIT_CODE ==="
            echo "=== Checking if images exist ==="
            docker images --filter=reference='openpaper-*' --format='{{.Repository}}:{{.Tag}}'
            echo "=== Compose config ==="
            docker compose -f docker-compose.ci.yml config 2>&1 || true
            echo "=== Docker compose ps (before) ==="
            docker compose -f docker-compose.ci.yml ps --all 2>&1 || true
            exit $EXIT_CODE
          fi
          echo "Waiting for services to be healthy..."

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health/live > /dev/null 2>&1; then
              echo "API is healthy after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "API failed to become healthy within 30 attempts"
              docker compose -f docker-compose.ci.yml logs api
              exit 1
            fi
            sleep 5
          done

      - name: Verify API health endpoint
        run: |
          echo "=== API Health Check ==="
          echo "=== V1 Health Live ==="
          curl -s http://localhost:8000/api/v1/health/live | python -m json.tool
          echo ""
          echo "=== Legacy Health ==="
          curl -s http://localhost:8000/api/health | python -m json.tool

      - name: Verify API ready endpoint
        run: |
          echo "=== API Ready Check ==="
          curl -s http://localhost:8000/api/v1/health/ready | python -m json.tool

      - name: Verify API deep check
        run: |
          echo "=== API Deep Check ==="
          curl -s http://localhost:8000/api/v1/health/deep | python -m json.tool

      - name: Verify frontend serves content
        run: |
          echo "=== Frontend Check ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
          if [ "$STATUS" -eq 200 ]; then
            echo "Frontend responded with HTTP 200 OK"
          else
            echo "Frontend responded with HTTP $STATUS"
            docker compose -f docker-compose.ci.yml logs web
            exit 1
          fi

      - name: Verify API response headers (security)
        run: |
          echo "=== Security Headers Check ==="
          curl -sI http://localhost:8000/api/v1/health/live | grep -i "x-frame-options\|x-content-type-options\|x-xss-protection\|strict-transport-security\|content-security-policy"
          echo ""
          echo "All security headers present."

      - name: Verify marketplace endpoint
        run: |
          echo "=== Marketplace Endpoint ==="
          curl -s http://localhost:8000/api/v1/marketplace | python -m json.tool | head -20

      - name: Service logs
        if: always()
        run: |
          echo "=== API Logs ==="
          docker compose -f docker-compose.ci.yml logs api --tail=50
          echo ""
          echo "=== Web Logs ==="
          docker compose -f docker-compose.ci.yml logs web --tail=20
          echo ""
          echo "=== PostgreSQL Logs ==="
          docker compose -f docker-compose.ci.yml logs postgres --tail=20
          echo ""
          echo "=== Redis Logs ==="
          docker compose -f docker-compose.ci.yml logs redis --tail=10
          echo ""
          echo "=== Qdrant Logs ==="
          docker compose -f docker-compose.ci.yml logs qdrant --tail=20

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
